name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run lint

      - run: bun test

      - run: bun run build

      - name: Generate third-party license notices
        run: npx license-checker --production --json > /tmp/licenses.json && node scripts/gen-licenses.js

      - run: npm publish --provenance --access public
